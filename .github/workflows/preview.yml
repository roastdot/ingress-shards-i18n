name: Development Preview

on:
    push:
        branches-ignore:
            - main
    workflow_dispatch:

jobs:
    build_preview:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.11"
                  cache: "pip"

            - name: Install python dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install --prefer-binary -r requirements.txt

            - name: Cache Geocode Database
              uses: actions/cache@v5
              with:
                  path: cache.sqlite
                  key: geocode-cache-${{ hashFiles('conf/series_metadata.json', 'conf/event_blueprints.json') }}
                  restore-keys: |
                      geocode-cache-

            - uses: actions/setup-node@v6
              with:
                  node-version: "lts/*"
                  cache: "npm"

            - name: Install node dependencies
              run: npm install

            - name: Build
              run: |
                  # Get accurate version string for the preview (e.g. 1.16.1-2-g1234abc)
                  # If no tags exist, defaults to 0.0.0-git_hash
                  LATEST_VERSION=$(git describe --tags --always --dirty | sed 's/^v//')
                  APP_VERSION=$LATEST_VERSION npm run build

            - name: Upload Processed Data Artifact
              uses: actions/upload-artifact@v7
              with:
                  name: processed-data
                  path: gen/processed_series_data.json

            - name: Upload Validation Reports Artifact
              uses: actions/upload-artifact@v7
              with:
                  name: validation-reports
                  path: gen/reports/
                  if-no-files-found: ignore

            - name: Sanitize branch name
              id: sanitize
              run: echo "branch=${GITHUB_REF_NAME//\//-}" >> $GITHUB_OUTPUT

            - name: Upload Preview Artifact
              uses: actions/upload-artifact@v7
              with:
                  name: preview-${{ steps.sanitize.outputs.branch }}
                  path: "./dist"
                  if-no-files-found: error


